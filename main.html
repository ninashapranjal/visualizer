<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>

    <h1 class="title">Algorithm Visualizer</h1>

    <div class="container">
      <!--quick sort, merge sort, bubble sort, selection sort, insertion sort, bfs, dfs, dijkstra's, prim's, kruskal's,-->
      
      <!-- side bar on left -->
      <div class="sidebar">
        <button id="linearBtn">Linear Search</button>
        <button id="binaryBtn">Binary Search</button>
        <button id="quickBtn">Quick Sort</button>
        <button id="mergeBtn">Merge Sort</button>
        <button id="bubbleBtn">Bubble Sort</button>
        <button id="selectionBtn">Selection Sort</button>
        <button id="insertionBtn">Insertion Sort</button>
      </div>

      <!-- visualization in center -->
      <div class="visualization">
        
        <!-- visualization box -->
        <div class="visualization-box">
          <div id="array-container"></div>
        </div>

        <!-- controls under visualization -->
        <div class="input-panel" id="inputPanel">
          <input
            type="text"
            id="arrayInput"
            placeholder="Enter array: 4,7,2,9"
          >

          <input
            type="number"
            id="targetInput"
            placeholder="Target value"
          >

          <button id="startBtn">
            Start Search
          </button>
        </div>
      </div>

      <!-- code panel on right -->
      <div class="code-panel">
        <h2>Code</h2>
        <div id="codeContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
